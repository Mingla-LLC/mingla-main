# CI checks when code is merged to main
# Ensures lint passes and builds succeed
name: Main Branch CI

on:
  push:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            app-mobile/package-lock.json
            mingla-admin/package-lock.json

      # Lint app-mobile (Expo/React Native)
      - name: Lint app-mobile
        working-directory: app-mobile
        run: |
          npm ci
          npm run lint

      # Lint and build mingla-admin (Next.js)
      - name: Lint mingla-admin
        working-directory: mingla-admin
        run: |
          npm ci
          npm run lint

      - name: Build mingla-admin
        working-directory: mingla-admin
        run: npm run build
