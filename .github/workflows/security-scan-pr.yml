# Security scan on every PR (all branches)
# Runs CodeQL code analysis + npm audit for dependency vulnerabilities
name: Security Scan (PR)

on:
  pull_request: {}  # Triggers on all PRs regardless of target branch

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'

  npm-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [app-mobile, mingla-admin]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Run npm audit
        working-directory: ${{ matrix.project }}
        run: npm audit --audit-level=high
        continue-on-error: true  # Warn but don't block; set to false to fail on high/critical vulns
